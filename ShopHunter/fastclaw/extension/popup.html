<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { width: 300px; padding: 15px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    h3 { margin-top: 0; color: #333; }
    button { 
      width: 100%; 
      padding: 10px; 
      background-color: #000; 
      color: white; 
      border: none; 
      cursor: pointer; 
      margin-bottom: 10px; 
      border-radius: 6px;
      font-weight: bold;
    }
    button:hover { background-color: #333; }
    #sendBtn { background-color: #28a745; }
    #sendBtn:hover { background-color: #218838; }
    #status { margin-top: 10px; font-size: 13px; color: #666; }
    .store-list { max-height: 200px; overflow-y: auto; list-style: none; padding: 0; margin-top: 10px; }
    .store-list li { 
      padding: 8px 5px; 
      border-bottom: 1px solid #eee; 
      word-break: break-all;
      font-size: 12px;
    }
    .url-checkbox { margin-right: 8px; }
  </style>
</head>
<body>
  <h3>FastClaw</h3>
  <button id="extractBtn">Extract Links</button>
  <button id="sendBtn" style="display:none;">Save Selected to DB</button>
  <div id="status">Ready.</div>
  <ul id="linkList" class="store-list"></ul>
  <script src="popup.js"></script>
</body>
</html>
